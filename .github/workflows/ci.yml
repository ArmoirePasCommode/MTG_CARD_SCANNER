name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "chore/ts-migration"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Backend: typecheck + lint + test + build
  # ─────────────────────────────────────────────
  backend:
    name: Backend (typecheck / lint / test / build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Mobile: typecheck + lint
  # ─────────────────────────────────────────────
  mobile:
    name: Mobile (typecheck / lint)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci
        working-directory: mobile

      - name: Typecheck
        run: npm run typecheck
        working-directory: mobile

      - name: Lint
        run: npm run lint
        working-directory: mobile

  # ─────────────────────────────────────────────
  # Format: Prettier check across both packages
  # ─────────────────────────────────────────────
  format:
    name: Format (Prettier)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install backend dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check
