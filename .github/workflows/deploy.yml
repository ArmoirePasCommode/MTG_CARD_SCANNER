name: Deploy to App Engine

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          corepack enable
          yarn install --frozen-lockfile || npm ci

      - name: Build
        run: |
          yarn build || npm run build

      - name: Run tests
        run: |
          yarn test || npm test

      - name: Auth to GCP (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Set JWT Secret from GitHub Secret (optional)
        run: |
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $GITHUB_ENV

      - name: Deploy to App Engine (retry up to 2x)
        run: |
          set -e
          for i in 1 2; do
            gcloud app deploy --quiet --verbosity=debug --promote && break || {
              echo "Retry $i failed; sleeping..."
              sleep 20
            }
          done

      - name: Ensure latest version has 100% traffic
        run: |
          set -e
          LATEST=$(gcloud app versions list --service=default --format="value(version.id)" --sort-by="~version.createTime" --limit=1)
          echo "Latest version: $LATEST"
          gcloud app services set-traffic default --splits $LATEST=1 --quiet

      - name: Wait for service to serve
        run: |
          set -e
          for i in {1..20}; do
            if curl -sSf https://mtg-card-scanner-477210.oa.r.appspot.com/test > /dev/null; then
              echo "Service is up"; exit 0; fi
            echo "Not up yet, retry $i..."; sleep 6;
          done
          echo "Service did not become healthy in time"; exit 1

      # Fallback for key-based auth (not recommended):
      # - name: Auth with service account key
      #   if: ${{ !secrets.GCP_WORKLOAD_IDP }}
      #   uses: google-github-actions/auth@v2
      #   with:
      #     credentials_json: ${{ secrets.GCP_SA_KEY_JSON }}


