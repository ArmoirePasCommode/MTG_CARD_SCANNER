name: Deploy to App Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  GCP_PROJECT_ID: mtg-card-scanner-477210
  SERVICE_URL: https://mtg-card-scanner-477210.oa.r.appspot.com

concurrency:
  group: app-engine-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build TypeScript
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDP }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to App Engine standard
        run: |
          gcloud config set project "${GCP_PROJECT_ID}"
          gcloud app deploy app.yaml --quiet

      - name: Check /test health endpoint
        run: |
          echo "Waiting for service to become ready..."
          # Simple retry loop: try /test up to 10 times with 6s delay (~1 min)
          for i in {1..10}; do
            echo "Attempt $i: checking ${SERVICE_URL}/test"
            status=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/test" || echo "000")
            if [ "$status" -eq 200 ]; then
              echo "Health check OK (HTTP 200) on ${SERVICE_URL}/test"
              exit 0
            fi
            echo "Got HTTP $status, retrying in 6 seconds..."
            sleep 6
          done
          echo "Health check FAILED for ${SERVICE_URL}/test after multiple attempts"
          exit 1

      - name: Post-deploy info
        run: |
          echo "Deployment triggered for ${SERVICE_URL}"
